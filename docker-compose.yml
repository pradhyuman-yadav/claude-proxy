services:
  claude-proxy:
    image: ghcr.io/pradhyuman-yadav/claude-proxy:main
    container_name: claude-proxy
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3456}:${PORT:-3456}"
    environment:
      # Required: OAuth token from ~/.claude/credentials.json (or Windows equivalent)
      # Run `claude auth login` first, then extract the token.
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:?Set CLAUDE_CODE_OAUTH_TOKEN in .env}
      - PORT=${PORT:-3456}
      - INTERNAL_PORT=13456
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${PORT:-3456}/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 3
